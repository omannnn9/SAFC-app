services:
  - type: web
    name: safc-app
    runtime: node
    plan: starter
    buildCommand: bun install && NITRO_PRESET=node-server bun run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NITRO_PRESET
        value: node-server
      - key: NODE_VERSION
        value: "20"
      # Add VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY,
      # SUPABASE_SERVICE_ROLE_KEY, FIRECRAWL_API_KEY, etc. via Render dashboard.
